<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Birthday 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #000000, #1a1a2e);
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

.container {
    margin-top: 100px;
}

input {
    padding: 12px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: #ff4b5c;
    color: white;
}

#message {
    display: none;
    margin-top: 40px;
    animation: fadeIn 2s ease-in-out forwards;
}

img {
    width: 250px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
    animation: zoomIn 2s ease;
}

#name {
    font-size: 40px;
    margin: 20px auto;
    text-align: center;
    letter-spacing: 5px;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff4b5c;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    display: block;
    width: fit-content;
    animation: typing 3s steps(15) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

@keyframes zoomIn {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

.glow {
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff4b5c;
}

/* Canvas full screen for fireworks */
#fireworksCanvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 999;
}
</style>
</head>

<body>

<canvas id="fireworksCanvas"></canvas>

<div class="container">
    <h1>🔒 Enter Password 🎁</h1>
    <input type="password" id="password" placeholder="Enter password">
    <br>
    <button onclick="checkPassword()">Unlock</button>

    <!-- 🎉 Birthday message and photo -->
    <div id="message">
        <h1 class="glow">🎉 Happy Birthday 🎂</h1>

        <div id="name">SHUBHAM BRO 💪</div>

        <img src="photo.jpg" alt="Birthday Photo">

        <p style="font-size:22px; margin-top:20px;">
            Tu sirf mera bhai nahi, mera best friend hai ❤️<br><br>
            Hamesha khush reh aur life mein bahut aage badh 🚀<br><br>
            Love you bhai 💙
        </p>
    </div>
</div>

<!-- Invisible YouTube background music -->
<iframe 
    width="1" height="1" 
    src="https://www.youtube.com/embed/T1tp0yMUKcI?autoplay=1&loop=1&playlist=T1tp0yMUKcI&controls=0&mute=0&modestbranding=1&iv_load_policy=3" 
    frameborder="0" 
    allow="autoplay" 
    allowfullscreen
    style="position:fixed; bottom:0; right:0; width:1px; height:1px; opacity:0; pointer-events:none;">
</iframe>

<!-- Footer -->
<div style="
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: #cccccc;
    font-family: Arial;
    pointer-events: none;
">
    WEB PAGE MADE BY SKR
</div>

<script>
function checkPassword() {
    var input = document.getElementById("password").value;
    var correctPassword = "Skr";

    if (input === correctPassword) {
        document.getElementById("message").style.display = "block";

        // Confetti
        confetti({
            particleCount: 200,
            spread: 100,
            origin: { y: 0.6 }
        });

        // Start fireworks
        startFireworks();

    } else {
        alert("Wrong password 😢");
    }
}

/* 🎆 FIREWORKS ANIMATION */
function startFireworks() {
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    function random(min, max) {
        return Math.random() * (max - min) + min;
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.radius = 2;
            this.color = color;
            this.vx = random(-3,3);
            this.vy = random(-5,-1);
            this.alpha = 1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    function createFirework() {
        const x = random(100, canvas.width-100);
        const y = random(50, canvas.height/2);
        const colors = ['#ff4b5c','#ffcc00','#00ffff','#ff66ff','#66ff66'];
        for(let i=0;i<50;i++){
            particles.push(new Particle(x,y,colors[Math.floor(Math.random()*colors.length)]));
        }
    }

    function animate() {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        for(let i=particles.length-1;i>=0;i--){
            particles[i].update();
            particles[i].draw();
            if(particles[i].alpha<=0){
                particles.splice(i,1);
            }
        }
        requestAnimationFrame(animate);
    }

    animate();

    // Launch fireworks every 800ms
    setInterval(createFirework, 800);
}
</script>

</body>
</html>
