<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Birthday 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #000000, #1a1a2e);
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    margin-top: 100px;
}

input {
    padding: 12px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: #ff4b5c;
    color: white;
}

#message {
    display: none;
    margin-top: 40px;
    animation: fadeIn 2s ease-in-out forwards;
}

img {
    width: 250px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
    animation: zoomIn 2s ease;
}

/* 🔥 CENTERED NAME ANIMATION */
#name {
    font-size: 40px;
    margin: 20px auto;
    text-align: center;
    letter-spacing: 5px;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff4b5c;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    display: block;
    width: fit-content;
    animation: typing 3s steps(15) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

@keyframes zoomIn {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

.glow {
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff4b5c;
}

/* Cake styles */
#cake-container {
    margin: 40px auto 0;
    width: 150px;
    cursor: pointer;
    position: relative;
}

#cake {
    width: 150px;
    height: 150px;
    background: linear-gradient(to bottom, #ff9999 0%, #ff4b5c 100%);
    border-radius: 15px 15px 30px 30px;
    box-shadow: 0 0 15px #ff4b5c;
    position: relative;
}

#cake:before {
    content: "";
    position: absolute;
    top: 20px;
    left: 30px;
    width: 90px;
    height: 30px;
    background: #fff5f5;
    border-radius: 15px;
    box-shadow: inset 0 5px 10px #ffb3b3;
}

#candle {
    width: 10px;
    height: 40px;
    background: yellow;
    position: absolute;
    top: -40px;
    left: calc(50% - 5px);
    border-radius: 3px;
    box-shadow: 0 0 10px yellow;
    animation: flicker 1s infinite alternate;
}

@keyframes flicker {
    0% { opacity: 1; }
    100% { opacity: 0.5; }
}

/* Cake cut animation */
#cake.cut {
    animation: cakeCut 1s forwards;
}

@keyframes cakeCut {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(0.9) rotate(15deg); }
    100% { transform: scale(0) rotate(0deg); opacity: 0; }
}

/* Message after cake cut */
#after-cut {
    display: none;
    font-size: 24px;
    margin-top: 20px;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff4b5c;
    animation: fadeIn 2s forwards;
}

</style>
</head>

<body>

<div class="container">
    <h1>🔒 Enter Password 🎁</h1>
    <input type="password" id="password" placeholder="Enter password">
    <br>
    <button onclick="checkPassword()">Unlock</button>

    <div id="message">
        <h1 class="glow">🎉 Happy Birthday 🎂</h1>

        <div id="name">SHUBHAM BRO 💪</div>

        <img src="photo.jpg" alt="Birthday Photo">

        <p style="font-size:22px; margin-top:20px;">
            Tu sirf mera bhai nahi, mera best friend hai ❤️<br><br>
            Hamesha khush reh aur life mein bahut aage badh 🚀<br><br>
            Love you bhai 💙
        </p>

        <div id="cake-container" title="Tap to cut the cake! 🎂" onclick="cutCake()">
            <div id="cake">
                <div id="candle"></div>
            </div>
        </div>

        <div id="after-cut">🎉 Cake cut! Happy Birthday! 🎉</div>
    </div>
</div>

<audio id="music" loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

<script>
function checkPassword() {
    var input = document.getElementById("password").value;
    var correctPassword = "1234";

    if (input === correctPassword) {
        document.getElementById("message").style.display = "block";
        document.getElementById("music").play();

        confetti({
            particleCount: 200,
            spread: 100,
            origin: { y: 0.6 }
        });

    } else {
        alert("Wrong password 😢");
    }
}

function cutCake() {
    const cake = document.getElementById('cake');
    const afterCut = document.getElementById('after-cut');

    // Animate cake cut
    cake.classList.add('cut');

    // Confetti blast on cake cut
    confetti({
        particleCount: 300,
        spread: 150,
        origin: { y: 0.5 }
    });

    // Show message after animation
    setTimeout(() => {
        afterCut.style.display = 'block';
        cake.style.display = 'none';
    }, 1000);
}
</script>

</body>
</html>
